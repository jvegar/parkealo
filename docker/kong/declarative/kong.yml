# Kong Declarative Configuration for Parkealo API Gateway
# This file defines the initial configuration for Kong API Gateway

_format_version: "3.0"
_transform: true

# Services - Define backend services that Kong will proxy to
services:
  # Health check service (for monitoring)
  - name: health-service
    url: http://kong:8001
    routes:
      - name: health-route
        paths:
          - /health
        strip_path: false

  # Example: User Service (to be updated with actual service URL)
  - name: user-service
    url: http://user-service:3001
    routes:
      - name: user-service-route
        paths:
          - /api/v1/users
          - /api/v1/users/*
        strip_path: true
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE

  # Example: Authentication Service (to be updated with actual service URL)
  - name: auth-service
    url: http://auth-service:3000
    routes:
      - name: auth-service-route
        paths:
          - /api/v1/auth
          - /api/v1/auth/*
        strip_path: true
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE

# Plugins - Global plugins applied to all services
plugins:
  # CORS plugin for development
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Authorization
        - Cache-Control
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - X-Auth-Token
        - X-Requested-With
      exposed_headers:
        - X-Auth-Token
      credentials: true
      max_age: 3600
      preflight_continue: false

  # Rate limiting plugin (global)
  - name: rate-limiting
    config:
      minute: 60
      hour: 1000
      day: 10000
      policy: local
      limit_by: consumer
      fault_tolerant: true
      hide_client_headers: false

  # Request transformer for adding headers
  - name: request-transformer
    config:
      add:
        headers:
          - "X-Forwarded-For:$remote_addr"
          - "X-Forwarded-Proto:$scheme"
          - "X-Forwarded-Host:$host"

# Consumers - Define API consumers (users, services, etc.)
consumers:
  - username: parkealo-web-app
    custom_id: web-app-client

  - username: parkealo-mobile-app
    custom_id: mobile-app-client

  - username: internal-service
    custom_id: internal-service-client

# Consumer groups for RBAC
consumer_groups:
  - name: web-clients
    consumers:
      - parkealo-web-app

  - name: mobile-clients
    consumers:
      - parkealo-mobile-app

  - name: internal-services
    consumers:
      - internal-service

# ACL plugin configuration for consumer groups
plugins:
  # ACL plugin for consumer groups
  - name: acl
    config:
      allow:
        - web-clients
        - mobile-clients
        - internal-services
      hide_groups_header: false

