# Kong API Gateway Configuration
# This file defines the Kong API Gateway setup for the Parkealo platform
# Kong is used as the API Gateway for routing, authentication, rate limiting, etc.

services:
  # Kong Database (PostgreSQL) - Stores Kong's configuration
  kong-database:
    image: postgres:15-alpine
    container_name: kong-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${KONG_PG_DATABASE:-kong}
      POSTGRES_USER: ${KONG_PG_USER:-kong}
      POSTGRES_PASSWORD: ${KONG_PG_PASSWORD:-kong}
      POSTGRES_PORT: ${KONG_PG_PORT:-5433}
    ports:
      - "${KONG_PG_PORT:-5433}:5432"
    volumes:
      - kong_postgres_data:/var/lib/postgresql/data
    networks:
      - kong-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${KONG_PG_USER:-kong} -d ${KONG_PG_DATABASE:-kong}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Kong Database Migration - Runs migrations before Kong starts
  kong-migration:
    image: kong:3.9.1
    container_name: kong-migration
    restart: on-failure
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_DATABASE: ${KONG_PG_DATABASE:-kong}
      KONG_PG_USER: ${KONG_PG_USER:-kong}
      KONG_PG_PASSWORD: ${KONG_PG_PASSWORD:-kong}
      KONG_PG_PORT: 5432
    command: kong migrations bootstrap
    depends_on:
      kong-database:
        condition: service_healthy
    networks:
      - kong-network

  # Kong Gateway - The API Gateway itself
  kong:
    image: kong:3.9.1
    container_name: kong-gateway
    restart: unless-stopped
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_DATABASE: ${KONG_PG_DATABASE:-kong}
      KONG_PG_USER: ${KONG_PG_USER:-kong}
      KONG_PG_PASSWORD: ${KONG_PG_PASSWORD:-kong}
      KONG_PG_PORT: 5432

      # Kong configuration
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr

      # Network configuration
      KONG_PROXY_LISTEN: 0.0.0.0:8000, 0.0.0.0:8443 ssl
      KONG_ADMIN_LISTEN: 0.0.0.0:8001, 0.0.0.0:8444 ssl
      KONG_ADMIN_GUI_LISTEN: 0.0.0.0:8002

      # Security settings
      KONG_ADMIN_GUI_URL: http://localhost:8002
      KONG_ADMIN_GUI_SESSION_CONF: '{"secret":"${KONG_ADMIN_GUI_SECRET:-change-me-please}","storage":"kong","cookie_secure":false}'

      # Plugin configuration
      KONG_PLUGINS: bundled,jwt,key-auth,basic-auth,acl,rate-limiting,request-transformer,response-transformer,cors

      # CORS configuration for development
      KONG_CORS_ORIGINS: "*"
      KONG_CORS_METHODS: GET,POST,PUT,PATCH,DELETE,OPTIONS
      KONG_CORS_HEADERS: "*"
      KONG_CORS_CREDENTIALS: "true"
      KONG_CORS_MAX_AGE: 3600
    ports:
      - "${KONG_PROXY_PORT:-8000}:8000" # Proxy port for API traffic
      - "${KONG_PROXY_SSL_PORT:-8443}:8443" # SSL proxy port
      - "${KONG_ADMIN_PORT:-8001}:8001" # Admin API port
      - "${KONG_ADMIN_GUI_PORT:-8002}:8002" # Kong Manager UI port
    volumes:
      - ./docker/kong/declarative:/kong/declarative
    depends_on:
      kong-database:
        condition: service_healthy
      kong-migration:
        condition: service_completed_successfully
    networks:
      - kong-network
      - parkealo-network
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  # Konga - Kong Admin UI (Optional)

  # Redis for Kong rate limiting and caching
  kong-redis:
    image: redis:7-alpine
    container_name: kong-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${KONG_REDIS_PASSWORD:-redis_password}
    ports:
      - "${KONG_REDIS_PORT:-6380}:6379"
    volumes:
      - kong_redis_data:/data
    networks:
      - kong-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  kong_postgres_data:
    driver: local
  kong_redis_data:
    driver: local

networks:
  kong-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
  parkealo-network:
    external: true
    name: docker_parkealo-network
